name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest --cov=checker --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Run ruff
        run: ruff check checker/ tests/

  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # pip-audit runs as an isolated tool, never a project dependency: an audit
      # tool must not pollute the graph it audits. Dev deps are in scope because
      # dev-only CVEs are still CVEs (a vulnerable msgpack once rode in through
      # a sibling repo's audit-tool stack — never again). --strict fails on any
      # advisory that cannot be resolved.
      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt -r requirements-dev.txt --strict

      # security-gate is pinned to a known-good commit, not a tag or @main.
      # The gate is fast-moving; a SHA pin is reproducible and bumped
      # deliberately. The v0.1.0 tag predates the gate's hardening (it shipped a
      # vulnerable msgpack) and would propagate a toothless build forward, so
      # pin the hardened HEAD instead.
      - name: Install security-gate (pinned)
        run: pip install "git+https://github.com/LeightonSec/security-gate.git@531d618231269b490fd2800484aee7e0feebca38"

      - name: Run security-gate
        # Real teeth: blocks on CRITICAL/HIGH. tests/ is excluded because test
        # fixtures carry deliberate weak-password patterns by design.
        run: security-gate scan . --exclude tests --output json --save

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: security-gate-report
          path: security-gate-report.json
